name: penny
description: "Penny — your money's best friend. Personal expense tracker with AI receipt scanning."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  # DI
  get_it: ^9.2.1

  # Local DB
  sqflite: ^2.4.3
  path: ^1.9.1
  path_provider: ^2.1.5

  # Network
  dio: ^5.9.2

  # Image / Camera
  image_picker: ^1.2.2
  camera: ^0.12.0+1

  # Charts
  fl_chart: ^1.2.0

  # Home widget
  home_widget: ^0.9.2

  # Fonts and SVG
  google_fonts: ^8.1.0
  flutter_svg: ^2.3.0

  # Permissions
  permission_handler: ^12.0.3

  # Currency / date format
  intl: ^0.20.2

  # Persistence (settings)
  shared_preferences: ^2.5.5

  # PDF export
  pdf: ^3.11.1
  printing: ^5.13.2

  # Misc UI
  shimmer: ^3.0.0
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  google_sign_in: ^7.2.0
  cloud_functions: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon.png"
  macos:
    generate: true
    image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/svg/
    - assets/svg/backgrounds/
    - assets/icon.png
